<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        width: 300px;
        padding: 15px;
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        border-radius: 8px;
      }
      #downloadImages, #get1688LinkId, #getTmallLinkId {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        transition: background-color 0.3s;
      }
      #downloadImages:hover, #get1688LinkId:hover, #getTmallLinkId:hover {
        background-color: #45a049;
      }
      #statusMessage {
        font-size: 14px;
        text-align: center;
        margin-top: 10px;
        color: #333;
        padding: 8px;
        background-color: #e9e9e9;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <button id="downloadImages">Download Product Images: 1688 / Amazon / Temu / Walmart</button>
    <!-- Get 1688 Link Id -->
    <button id="get1688LinkId">Get 1688 Link Id</button>
    <button id="getTmallLinkId">Get Tmall Link Id</button>
    <div id="statusMessage"></div>
    <script src="popup.js"></script>
  </body>
</html>
